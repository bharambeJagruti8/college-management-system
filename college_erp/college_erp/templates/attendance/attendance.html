<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Educore - Attendance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow border-0">
        <div class="card-header bg-dark text-white p-3">
            <h3 class="mb-0 text-center">Student Attendance</h3>
        </div>
        <div class="card-body p-4">
            <form method="POST">
                {% csrf_token %}
                <table class="table table-striped align-middle">
                    <thead class="table-secondary">
                        <tr>
                            <th style="width: 60%;">Student Name</th>
                            <th class="text-center">Attendance Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for student in students %}
                        <tr>
                            <td class="fw-bold">{{ student.name }}</td>
                            <td class="text-center">
                                <div class="btn-group" role="group">
                                    <input type="radio" class="btn-check" name="status_{{ student.id }}" id="p{{ student.id }}" value="Present" checked>
                                    <label class="btn btn-outline-success px-4" for="p{{ student.id }}">Present</label>

                                    <input type="radio" class="btn-check" name="status_{{ student.id }}" id="a{{ student.id }}" value="Absent">
                                    <label class="btn btn-outline-danger px-4" for="a{{ student.id }}">Absent</label>
                                </div>
                            </td>
                        </tr>
                        {% empty %}
                        <tr>
                            <td colspan="2" class="text-center text-muted py-4">No student records found.</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>

                <div class="d-grid mt-4">
                    <button type="submit" class="btn btn-primary btn-lg shadow-sm">Save Attendance</button>
                </div>
            </form>
        </div>
    </div>
</div>

</body>
</html>
