<!DOCTYPE html>
<html>
<head>
    <title>College ERP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background: #f4f6f9; margin: 0; }
        
        .sidebar {
            height: 100vh;
            background: #1f2d3d;
            color: white;
            position: fixed;
            width: 240px; /* Thoda width badha diya */
            overflow-y: auto;
        }

        .sidebar h4 {
            padding: 20px 10px;
            background: #17222d;
            margin-bottom: 0;
            font-weight: bold;
        }

        .sidebar a {
            color: #c2c7d0;
            display: block;
            padding: 12px 20px;
            text-decoration: none;
            transition: 0.3s;
            border-left: 3px solid transparent;
        }

        .sidebar a i { width: 25px; }

        .sidebar a:hover {
            background: rgba(255,255,255,0.1);
            color: white;
            border-left: 3px solid #3c8dbc;
        }

        .content {
            margin-left: 240px; /* Sidebar width ke barabar */
            padding: 30px;
            min-height: 100vh;
        }

        .card {
            border: none;
            border-radius: 10px;
            box-shadow: 0px 2px 10px rgba(0,0,0,0.05);
        }
    </style>
</head>

<body>

<div class="sidebar">
    <h4 class="text-center"><i class="fas fa-university me-2"></i>College ERP</h4>
    
    <a href="{% url 'admin_dashboard' %}"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
    <a href="{% url 'manage_students' %}"><i class="fas fa-users"></i> Students</a>
    <a href="{% url 'Staff_list' %}"><i class="fas fa-chalkboard-teacher"></i> Teachers</a>
    <a href="{% url 'library_dashboard' %}"><i class="fas fa-book"></i> Library</a>
    <a href="{% url 'manage_departments' %}"><i class="fas fa-building"></i> Departments</a>
    <a href="{% url 'student_attendance' %}"><i class="fas fa-calendar-check"></i> Attendance</a>
    <a href="{% url 'admin_dashboard' %}"><i class="fas fa-hand-holding-usd"></i> Fees</a>
    <a href="#"><i class="fas fa-robot"></i> Ask AI</a>
    <a href="#"><i class="fas fa-book-open"></i> Study Plan</a>
    <a href="#"><i class="fas fa-file-alt"></i> Bonafide</a>
    <a href="#"><i class="fas fa-clipboard-list"></i> Bonafide Requests</a>

    <hr class="mx-3 text-secondary">
    <a href="{% url 'logout' %}" class="text-danger"><i class="fas fa-sign-out-alt"></i> Logout</a>
</div>

<div class="content">
    {% block content %}
    {% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
