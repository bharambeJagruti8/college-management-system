<!DOCTYPE html>
<html>
<head>
    <title>New Admission</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .form-card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-top: 50px; }
        .btn-submit { background-color: #198754; color: white; border: none; padding: 10px 20px; border-radius: 5px; }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 form-card">
            <h3 class="mb-4 text-center">🎓 Student Admission Form</h3>
            <hr>
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">First Name</label>
                    <input type="text" name="first_name" class="form-control" placeholder="Enter first name" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Last Name</label>
                    <input type="text" name="last_name" class="form-control" placeholder="Enter last name">
                </div>
                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="email" name="email" class="form-control" placeholder="example@mail.com" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Mobile Number</label>
                    <input type="text" name="mobile_number" class="form-control" placeholder="Enter mobile number">
                </div>
                <div class="row mb-3">
    <div class="col">
        <input type="text" name="aadhar_no" class="form-control" placeholder="Aadhar Number">
    </div>
    <div class="col">
        <input type="number" name="marks_10th" class="form-control" placeholder="10th Marks %">
    </div>
</div>
<div class="row mb-3">
    <div class="col">
        <input type="text" name="parent_name" class="form-control" placeholder="Parent Name">
    </div>
    <div class="col">
        <input type="text" name="parent_mobile" class="form-control" placeholder="Parent Mobile">
    </div>
</div>
                <div class="mb-3">
                    <label class="form-label">Department</label>
                    <select name="department" class="form-select" required>
                        <option value="">-- Choose Department --</option>
                        {% for d in departments %}
                            <option value="{{ d.id }}">{{ d.department_name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="d-grid mt-4">
                    <button type="submit" class="btn btn-submit">Submit Admission</button>
                    <a href="/admissions/dashboard/" class="btn btn-link text-secondary mt-2">Back to Dashboard</a>                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
