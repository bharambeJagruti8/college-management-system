<!DOCTYPE html>
<html>
<head>
    <title>Pay Fee</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow">
                <div class="card-body">
                    <h4 class="card-title text-center">💰 Pay Fees</h4>
                    <p class="text-center text-muted">Student: <b>{{ student.first_name }} {{ student.last_name }}</b></p>
                    <hr>
                    <<form method="POST">
    {% csrf_token %}
    
    {% if not student %}
    <div class="mb-3">
        <label>Student Select karo</label>
        <select name="student" class="form-control" required>
            <option value="">-- Student chunо --</option>
            {% for s in students %}
            <option value="{{ s.id }}">{{ s.first_name }} {{ s.last_name }} ({{ s.roll_no }})</option>
            {% endfor %}
        </select>
    </div>
    {% else %}
    <input type="hidden" name="student" value="{{ student.id }}">
    {% endif %}

    <div class="mb-3">
        <label>Amount (₹)</label>
        <input type="number" name="amount" class="form-control" required>
    </div>

    <div class="mb-3">
        <label>Transaction ID</label>
        <input type="text" name="transaction_id" class="form-control">
    </div>

    <button type="submit" class="btn btn-success w-100">Save Payment</button>
</form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
