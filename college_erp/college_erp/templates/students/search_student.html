{% extends 'base.html' %}

{% block content %}

<h3>Search Student</h3>

<form method="GET">
    <input type="text" name="q" placeholder="Enter student name" class="form-control mb-3">
    <button type="submit" class="btn btn-primary">Search</button>
</form>

<table class="table table-bordered">
<tr>
<th>Name</th>
<th>Department</th>
<th>Email</th>
</tr>

{% for student in students %}
<tr>
<td>{{ student.name }}</td>
<td>{{ student.department }}</td>
<td>{{ student.email }}</td>
</tr>
{% endfor %}

</table>

{% endblock %}
