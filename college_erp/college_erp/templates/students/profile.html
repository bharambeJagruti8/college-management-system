{% extends "student/dashboard.html" %} {% block content %}
<div class="container mt-5">
    <div class="card p-4 shadow-sm" style="max-width: 500px; margin: auto;">
        <h4 class="fw-bold mb-4">Update Profile</h4>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary w-100">Save Changes</button>
        </form>
        <a href="{% url 'student_dashboard' %}" class="btn btn-link w-100 mt-2">Back to Dashboard</a>
    </div>
</div>
{% endblock %}
