{% extends 'base.html' %}
{% block content %}
<div class="container mt-4">
    <h2>Manage Staff</h2>
    <form method="POST" class="card p-3 mb-4">
        {% csrf_token %}
        <div class="row">
            <div class="col"><input type="text" name="name" class="form-control" placeholder="Teacher Name" required></div>
            <div class="col"><input type="email" name="email" class="form-control" placeholder="Email" required></div>
            <div class="col">
                <select name="dept" class="form-control">
                    {% for d in depts %}<option value="{{ d.id }}">{{ d.name }}</option>{% endfor %}
                </select>
            </div>
            <div class="col"><button type="submit" class="btn btn-success">Add Teacher</button></div>
        </div>
    </form>
    <table class="table table-dark">
        <thead><tr><th>Name</th><th>Email</th><th>Department</th></tr></thead>
        <tbody>
            {% for f in faculties %}
            <tr><td>{{ f.name }}</td><td>{{ f.email }}</td><td>{{ f.department.name }}</td></tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
