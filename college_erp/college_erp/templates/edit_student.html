<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Student | EduCore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { background-color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; }
        .main-content { margin-left: 280px; padding: 50px; }
        .glass-panel { 
            background: white; border-radius: 24px; padding: 40px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid #f1f5f9;
            max-width: 600px;
        }
        .form-label { font-weight: 700; color: #475569; font-size: 0.9rem; }
        .form-control { 
            border-radius: 12px; padding: 12px 20px; border: 1px solid #e2e8f0; 
            background: #f8fafc; transition: 0.3s;
        }
        .form-control:focus { border-color: #4361ee; box-shadow: 0 0 0 4px rgba(67, 97, 238, 0.1); }
        .btn-update { background: #4361ee; color: white; border-radius: 12px; padding: 12px 30px; font-weight: 700; border: none; transition: 0.3s; }
        .btn-update:hover { background: #3046bd; transform: translateY(-2px); }
        .btn-cancel { color: #64748b; font-weight: 600; text-decoration: none; margin-left: 20px; }
    </style>
</head>
<body>

    {% include 'sidebar.html' %}

    <main class="main-content">
        <div class="mb-4">
            <h2 class="fw-bold text-dark">Edit Student Details</h2>
            <p class="text-muted">Updating profile for Roll No: <strong>{{ student.roll_no }}</strong></p>
        </div>
        
        <div class="glass-panel">
            <form method="POST">
                {% csrf_token %}
                <div class="mb-4">
                    <label class="form-label"><i class="fas fa-id-card me-2"></i>Roll Number</label>
                    <input type="text" class="form-control" value="{{ student.roll_no }}" disabled>
                    <small class="text-muted">Roll number cannot be changed.</small>
                </div>

                <div class="mb-4">
                    <label class="form-label"><i class="fas fa-user me-2"></i>First Name</label>
                    <input type="text" name="first_name" class="form-control" value="{{ student.first_name }}" required>
                </div>

                <div class="mb-4">
                    <label class="form-label"><i class="fas fa-user me-2"></i>Last Name</label>
                    <input type="text" name="last_name" class="form-control" value="{{ student.last_name }}" required>
                </div>
                
                <div class="mb-4">
                    <label class="form-label"><i class="fas fa-graduation-cap me-2"></i>Course</label>
                    <input type="text" name="course" class="form-control" value="{{ student.course }}" required>
                </div>
                
                <div class="d-flex align-items-center mt-5">
                    <button type="submit" class="btn-update">
                        <i class="fas fa-save me-2"></i> Save Changes
                    </button>
                    <a href="/dashboard-module/manage-students/" class="btn-cancel">Cancel</a>
                </div>
            </form>
        </div>
    </main>

</body>
</html>
